[package]
name = "drlt-app"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "DRLT 213 App — Simplex, Basel, AlphaEM, magic numbers. Mirrors lean/E213/App/ + Physics/."

[[bin]]
name = "alpha-em-bracket"
path = "src/bin/alpha_em_bracket.rs"

[[bin]]
name = "gap-explorer"
path = "src/bin/gap_explorer.rs"

[dependencies]
drlt-kernel     = { path = "../kernel" }
drlt-firmware   = { path = "../firmware" }
drlt-hypervisor = { path = "../hypervisor" }
drlt-os         = { path = "../os" }
num-bigint      = { workspace = true }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
float_arithmetic = "deny"
