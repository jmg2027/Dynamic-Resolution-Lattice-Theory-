path = "src/bin/impedance_search.rs"

[[bin]]
name = "triple-coupling"
path = "src/bin/triple_coupling.rs"

[[bin]]
name = "overlap-series"
path = "src/bin/overlap_series.rs"

[[bin]]
name = "series-truncation"
path = "src/bin/series_truncation.rs"

[[bin]]
name = "cf-generator"
path = "src/bin/cf_generator.rs"

[[bin]]
name = "propagator-form"
