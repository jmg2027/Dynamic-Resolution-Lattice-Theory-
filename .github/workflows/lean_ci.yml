name: Lean build

# Sanity: lake build should succeed.  Pointed at lean/ (root Lean lib).
# The earlier path 'critical-line/lean/**' was a leftover from the
# abandoned sub-projects plan and never existed.

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'lean/**'
      - '.github/workflows/lean_ci.yml'
  pull_request:
    paths:
      - 'lean/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build-args: ''
